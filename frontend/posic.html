<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posicionamento Radiografico</title>
    <link rel="stylesheet" href="posic.css">
</head>
<body>
    <!-- Cabeçalho -->
    <header>
        <h1>Posicionamento Radiografico.</h1>
        <button id="abrirCalculadora"> 
            Calculadora
        </button>


    </header>

    <div id="container">
        <label for="pesquisa">Busca Rápida:</label>
        <input type="text" name="pesquisa" id="pesquisa">
        <input type="button" value="Procurar" id="botao">
    </div>

    <div id="inicial">
        <input type="button" value="Membro Superior" id="superior">
        <input type="button" value="Membro Inferior" id="inferior">
        <input type="button" value="Torax" id="torax">
        <input type="button" value="Abdomem" id="abdomem">
        <input type="button" value="Colunas" id="coluna">
    </div>

    <div id="incidencias">
        <input type="button" value="Voltar" id="voltar">
    </div>

    <section id="calculadora">
        <h2>Calculadora de Kv</h2>
            Espessura: <input type="number" id="espessura">
            constante: <input type="number" id="constante">
        <button id="calcular">Calcular Kv:</button>
        <p id="resultado">Resultado: </p>
            <ul id="historico">
                Historico
            </ul>
    </section>
    
    <script src="posic2.js"></script>
    <script src="calculadora.js"></script>
</body>
</html>
